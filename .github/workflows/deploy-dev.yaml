name: Deploy Dev

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  deploy-dev:
    name: Deploy Dev
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Build with Maven
        run: mvn clean package

      - name: Upload
        run: "curl -X PUT -H 'Authorization: Bearer ${{ secrets.EXAROTON_TOKEN }}' -T target/endergames-*.jar https://api.exaroton.com/v1/servers/${{ secrets.EXAROTON_SERVER_ID }}/files/data/plugins/endergames-dev.jar"
