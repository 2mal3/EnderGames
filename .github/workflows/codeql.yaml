name: CodeQL

on:
  push:
    branches: [main]
    paths:
      - "**.java"
  pull_request:
    branches: [main]
    paths:
      - "**.java"
  workflow_dispatch:

jobs:
  google-java-format:
    name: Google Java Format
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cachix/devenv/devenv:latest
    steps:
      - name: Checkout
        run: git clone --single-branch --branch ${{ github.ref_name }} https://github.com/2mal3/EnderGames .

      - name: Run google-java-format
        run: devenv tasks run test:format

  test:
    name: Test
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cachix/devenv/devenv:latest
    steps:
      - name: Checkout
        run: git clone --single-branch --branch ${{ github.ref_name }} https://github.com/2mal3/EnderGames .

      - name: Run mvn
        run: devenv tasks run test:logic
