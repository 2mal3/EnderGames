name: CodeQL

on:
  push:
    branches: [main]
    paths:
      - "**.java"
  pull_request:
    branches: [main]
    paths:
      - "**.java"
  workflow_dispatch:

jobs:
  google-java-format:
    name: Google Java Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Cache
        uses: cachix/cachix-action@v16
        with:
          name: devenv

      - name: Install devenv.sh
        run: nix profile add nixpkgs#devenv

      - name: Run google-java-format
        run: devenv tasks run test:format

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Cache Nix
        uses: cachix/cachix-action@v16
        with:
          name: devenv

      - name: Install devenv.sh
        run: nix profile add nixpkgs#devenv

      - name: Cache .devenv
        uses: actions/cache@v5
        with:
          path: .devenv
          key: devenv

      - name: Run mvn
        run: devenv tasks run test:logic
